
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта — Premium</title>

<style>

/* ===== ФОН (PNG) ===== */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:url("festiv.png") center/cover no-repeat fixed;
    overflow:hidden;
    perspective:1200px;
}

/* затемнение для читаемости */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* ===== 3D НАДПИСЬ ===== */
#title{
    position:fixed;
    top:20px;
    width:100%;
    text-align:center;
    font-size:64px;
    font-weight:bold;
    color:#ffd700;
    z-index:5;
    letter-spacing:3px;
    text-transform:uppercase;

    text-shadow:
        1px 1px 0 #e6b800,
        2px 2px 0 #cc9900,
        3px 3px 0 #b8860b,
        4px 4px 15px rgba(0,0,0,0.6);

    animation:titleFloat 4s ease-in-out infinite;
}

@keyframes titleFloat{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-8px);}
}

/* ===== СЕТКА ===== */
.container{
    position:absolute;
    top:130px;
    width:100%;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(6,120px);
    gap:25px;
    padding:30px;
    box-sizing:border-box;
    z-index:3;
}

/* ===== 3D КНОПКИ ===== */
.flower-btn{
    border:none;
    border-radius:18px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
        0 15px 25px rgba(0,0,0,0.5),
        inset 0 3px 6px rgba(255,255,255,0.8);
    transform-style:preserve-3d;
    transition:all .4s ease;
    cursor:pointer;
    animation:fadeIn .8s ease forwards;
    opacity:0;
}

.flower-btn img{
    max-width:90%;
    max-height:90%;
    object-fit:contain;
}

.flower-btn:hover{
    transform:rotateX(8deg) rotateY(-8deg) scale(1.1);
    box-shadow:
        0 25px 45px rgba(0,0,0,0.6),
        0 0 25px rgba(255,215,0,0.7);
}

.flower-btn:active{
    transform:translateY(6px) scale(0.95);
}

/* анимация появления */
@keyframes fadeIn{
    from{ opacity:0; transform:translateY(30px);}
    to{ opacity:1; transform:translateY(0);}
}

/* ===== САЛЮТ ===== */
#fireworksCanvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:6;
    opacity:0;
    transition:opacity 1.5s ease;
}

/* ===== КОМПЛИМЕНТ 3D ===== */
#messageBox{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:36px;
    font-weight:900;
    max-width:800px;
    padding:40px 50px;

    color:#2b1a0f; /* тёмный благородный оттенок */

    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);
    border-radius:20px;

    box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        inset 0 3px 8px rgba(255,255,255,0.9);

    text-shadow:
        1px 1px 0 #ffffff,
        2px 2px 0 #d4af37,
        3px 3px 6px rgba(0,0,0,0.3);

    display:none;
    z-index:7;
    animation:complimentAppear .6s ease-out;
}


/* плавное появление */
@keyframes complimentAppear{
    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(0.7);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}

#backBtn{
    margin-top:30px;
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,64,129,0.8);
    transition:.3s;
}

#backBtn:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div id="title">С 8 Марта!</div>

<div class="container" id="buttons"></div>

<canvas id="fireworksCanvas"></canvas>

<div id="messageBox">
    <div id="compliment"></div>
    <button id="backBtn">Назад</button>
</div>

<script>

const compliments=[ /* 30 комплиментов */
"Вы так хорошо объясняете, что мы иногда даже перестаём бояться уроков!",
"Вы умеете объяснять так, что мы иногда даже перестаём отвлекаться!",
"Вы умеете находить баланс между строгостью и добротой!",
"Вы — учитель, который делает школу лучше!",
"У Вас удивительная способность замечать всё, даже наши попытки списать!",
"Ваши вопросы иногда заставляют нас думать быстрее, чем мы планировали!",
"Вы умеете объяснять так, что становится стыдно не стараться!",
"Вы — очень мудрый и вдохновляющий учитель!",
"С Вами даже контрольные кажутся не такими страшными!",
"Вы так хорошо выглядите, что мы иногда забываем про тему урока!",
"Вы умеете делать уроки интересными даже в конце дня!",
"С Вами даже понедельники становятся немного легче!",
"Вы так интересно рассказываете, что мы иногда забываем записывать!",
"С Вами время на уроке иногда проходит быстрее, чем перемена!",
"Вы очень современный и интересный учитель!",
"ы — учитель, которого приятно слушать!",
"Вы очень творчески подходите к работе!",
"Вы вдохновляете своим примером!",
"Вы — пример профессионализма и харизмы!",
"У Вас очень современный стиль, будто Вы знаете все школьные тренды!",
"Вы — тот учитель, на уроках которого мы иногда действительно слушаем!",
"Вы — учитель, которого приятно слушать (даже если мы иногда отвлекаемся)!",
"У Вас очень красивый и доброжелательный взгляд!",
"Вы умеете поддерживать интерес к предмету!",
"Вы умеете заставить нас работать почти незаметно!",
"Вы очень внимательный и чуткий человек!",
"Вы умеете задавать вопросы так, что мы сразу начинаем вспоминать всё, что учили!",
"Вы умеете объяснять так, что даже мы сами себе верим!",
"У Вас удивительное умение появляться в классе в самый нужный момент",
"Вы умеете подбодрить взглядом лучше, чем словами!"
];

const container=document.getElementById("buttons");

for(let i=1;i<=30;i++){
    let btn=document.createElement("button");
    btn.className="flower-btn";
    btn.style.animationDelay=(i*0.05)+"s";

    let img=document.createElement("img");
    img.src=`images/flowers/${i}.jpg`;

    btn.appendChild(img);
    btn.onclick=()=>{
    startMusic();
    document.getElementById("clickSound").currentTime = 0;
    document.getElementById("clickSound").play();
    startFireworks(i-1);
};
    container.appendChild(btn);
}

/* ===== САЛЮТ ===== */
const canvas=document.getElementById("fireworksCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function startFireworks(index){
    canvas.style.opacity=1;
    let particles=[];
    for(let i=0;i<180;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            angle:Math.random()*Math.PI*2,
            speed:Math.random()*9+3,
            radius:Math.random()*3+1,
            life:80,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();
            p.x+=Math.cos(p.angle)*p.speed;
            p.y+=Math.sin(p.angle)*p.speed;
            p.speed*=0.96;
            p.life--;
        });

        particles=particles.filter(p=>p.life>0);

        if(particles.length>0){
            requestAnimationFrame(animate);
        }else{
            canvas.style.opacity=0;
            setTimeout(()=>{
                showCompliment(index);
            },800);
        }
    }
    animate();
}

function showCompliment(index){
    const box = document.getElementById("messageBox");
    document.getElementById("compliment").innerText = compliments[index];
    box.style.display="block";

    const sound = document.getElementById("complimentSound");
    sound.volume = 0.6;
    sound.currentTime = 0;
    sound.play();

    createSparkles();
    createPetals();
}

document.getElementById("backBtn").onclick=function(){
    document.getElementById("messageBox").style.display="none";
};
let musicStarted = false;

function startMusic(){
    if(!musicStarted){
        const music = document.getElementById("bgMusic");
        music.volume = 0.4; // нежный уровень
        music.play();
        musicStarted = true;
    }
}
</script>

<!-- АУДИО -->
<audio id="clickSound" src="audio/click.mp3"></audio>
<audio id="complimentSound" src="audio/compliment.mp3"></audio>
<audio id="bgMusic" src="audio/music.mp3" loop></audio>



</body>
</html>
